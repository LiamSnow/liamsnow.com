<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="author" content="William Snow IV">
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">

  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:site_name" content="Liam Snow">
  <meta property="og:image" content="{{ site.url }}/assets/images/{{ page.og_image | default: 'og.png' }}">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">

  <meta name="theme-color" content="#f0fb29">

  {% if page.url == "/" %}
  <link rel="preload" href="/assets/fonts/DINNextSlabBlack.woff2" as="font" type="font/woff2" crossorigin="anonymous">
  {% endif %}
  <link rel="preload" href="/assets/fonts/SpaceGrotesk-Regular.woff2" as="font" type="font/woff2" crossorigin="anonymous">
  <link rel="preload" href="/assets/fonts/SpaceGrotesk-Bold.woff2" as="font" type="font/woff2" crossorigin="anonymous">

  <link rel="stylesheet" href="/assets/css/main0.css">
  {% if page.layout == "post" %}
  <link rel="stylesheet" href="/assets/css/post0.css">
  {% endif %}
  {% if page.extra_css %}
  <link rel="stylesheet" href="/assets/css/{{ page.extra_css }}0.css">
  {% endif %}

  <script type="application/ld+json">{% include schema/schema.json %}</script>
  {% if page.url == "/" %}
  <script type="application/ld+json">{% include schema/ld.json %}</script>
  {% endif %}

  <script type="text/javascript">{% include js/preload.js %}</script>
  <script type="text/javascript">{% include js/light_dark.js %}</script>
  <script type="text/javascript">{% include js/header.js %}</script>
  <script type="text/javascript">{% include js/date.js %}</script>
  <script type="text/javascript">{% include js/extlink.js %}</script>
</head>
<body>
  {% include header.html %}

  <main>
    <div id="content">
      {{ content }}
    </div>
  </main>

  {% include footer.html %}
</body>
</html>
